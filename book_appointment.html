<h2>Book Appointment</h2>
<form method="post">
  Patient:
  <select name="patient_id">
    {% for p in patients %}
    <option value="{{ p[0] }}">{{ p[1] }}</option>
    {% endfor %}
  </select><br>
  Doctor:
  <select name="doctor_id">
    {% for d in doctors %}
    <option value="{{ d[0] }}">{{ d[1] }}</option>
    {% endfor %}
  </select><br>
  Date: <input type="date" name="date"><br>
  <button type="submit">Book</button>
</form>

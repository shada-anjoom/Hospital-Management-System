<h2>Appointments</h2>
<table border="1">
  <tr><th>ID</th><th>Patient</th><th>Doctor</th><th>Date</th><th>Status</th></tr>
  {% for appt in appointments %}
  <tr>
    <td>{{ appt[0] }}</td>
    <td>{{ appt[1] }}</td>
    <td>{{ appt[2] }}</td>
    <td>{{ appt[3] }}</td>
    <td>{{ appt[4] }}</td>
  </tr>
  {% endfor %}
</table>
